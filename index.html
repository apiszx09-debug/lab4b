<!DOCTYPE html>
<html>
<head>
    <title>Lab 4b - JSON display</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Books Data "Console"</h1>

    <script>
        $(document).ready(function() {
            
            $.getJSON("books.json", function(data) {
                
               
                console.log("Title of first book: " + data[0].title);

                console.log("Author of second book: " + data[1].author);

               
                console.log("Genres of all books:");
                data.forEach(function(book) {
                    console.log(book.title + ": " + book.genres.join(", "));
                });

            }).fail(function() {
                console.log("Ralat: Pastikan fail books.json berada dalam folder yang sama.");
            });
        });
    </script>
</body>
</html>
